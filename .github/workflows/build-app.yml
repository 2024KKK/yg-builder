name: Build Desktop App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-app.yml"
      - "electron.vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "docs/icon.ico"
      - "docs/icon.icns"
      - "docs/icon.png"
      - "scripts/generate-icon.mjs"
      - "src/**"
  pull_request:
    paths:
      - ".github/workflows/build-app.yml"
      - "electron.vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "docs/icon.ico"
      - "docs/icon.icns"
      - "docs/icon.png"
      - "scripts/generate-icon.mjs"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-2025
            script: dist:win
            artifact: topspeed-builder-windows-x64
          - name: macOS arm64
            os: macos-15
            script: dist:mac:arm64
            artifact: topspeed-builder-macos-arm64
          - name: macOS Intel
            os: macos-15-intel
            script: dist:mac:x64
            artifact: topspeed-builder-macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ci-logs | Out-Null
          $logPath = "ci-logs/package-${{ matrix.artifact }}.log"
          npm run ${{ matrix.script }} 2>&1 | Tee-Object -FilePath $logPath
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $tail = (Get-Content $logPath -Tail 80) -join "`n"
            $escaped = $tail.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=Package app failed::$escaped"
            exit $exitCode
          }
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/**/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload package logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-logs
          path: ci-logs/**/*
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: package
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Delete existing release if any
        run: gh release delete ${{ github.ref_name }} --yes --repo ${{ github.repository }} 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Debug artifacts
        run: find release-artifacts -type f | head -20

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title ${{ github.ref_name }} \
            --notes "详见 [CHANGELOG](./CHANGELOG.md)" \
            release-artifacts/**/*
        env:
          GH_TOKEN: ${{ github.token }}
