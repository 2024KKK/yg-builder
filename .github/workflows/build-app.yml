name: Build Desktop App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-app.yml"
      - "electron.vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "docs/icon.png"
      - "src/**"
  pull_request:
    paths:
      - ".github/workflows/build-app.yml"
      - "electron.vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "docs/icon.png"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-2025
            command: npm run dist:win
            artifact: topspeed-builder-windows-x64
          - name: macOS arm64
            os: macos-15
            command: npm run dist:mac:arm64
            artifact: topspeed-builder-macos-arm64
          - name: macOS Intel
            os: macos-15-intel
            command: npm run dist:mac:x64
            artifact: topspeed-builder-macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package app
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/**/*
          if-no-files-found: error
          retention-days: 14
